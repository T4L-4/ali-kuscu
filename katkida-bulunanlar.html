<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katkıda Bulunanlar | Ali Kuşçu Camii Gençlik Merkezi</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Translation Disclaimer Modal -->
  <div id="translate-disclaimer" class="translate-disclaimer">
    <div class="disclaimer-card">
      <div class="disclaimer-icon">⚠️</div>
      <p id="disclaimer-text" class="disclaimer-text"></p>
      <button class="disclaimer-btn" id="disclaimer-close-btn">OK</button>
    </div>
  </div>

  <!-- Header Section -->
  <header class="main-header scrolled" id="main-header">
    <div class="nav-container">
      <a href="index.html" class="logo notranslate" id="nav-logo">
        <span>Ali Kuşçu</span> Camii
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Ana Sayfa</a></li>
        <li><a href="faaliyetler.html">Tüm Faaliyetler</a></li>
      </ul>
      <div style="display: flex; align-items: center; gap: 12px;">
        <div class="lang-selector notranslate">
          <button class="lang-btn" id="lang-btn">🌐 <span id="lang-text">TR</span></button>
          <div class="lang-dropdown" id="lang-dropdown">
            <a href="#" data-lang="tr">TR</a>
            <a href="#" data-lang="en">EN</a>
            <a href="#" data-lang="es">ES</a>
            <a href="#" data-lang="ar">AR</a>
          </div>
        </div>
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Tema Değiştir">🌙</button>
      </div>
    </div>
  </header>

  <!-- Page Header -->
  <section class="section" style="padding-top: 160px; padding-bottom: 20px;">
    <div class="section-header">
      <span class="section-tag">Birlikte Güçlüyüz</span>
      <h1 class="section-title">Destekçilerimiz</h1>
      <p class="section-desc">Camimizin gençlik, ilim ve bilim vizyonuna katkıda bulunan tüm değerli destekçilerimiz ve
        eğitmenlerimiz.</p>
    </div>
  </section>

  <!-- Search & Grid Section -->
  <section class="section" style="padding-top: 0;">
    <div class="search-container">
      <input type="text" id="contributor-search" class="search-input"
        placeholder="Destekçi ismi veya ünvanı ara (Örn: Mehmet, Eğitmen)..." />
    </div>

    <div class="team-grid-4" id="contributors-grid-all" data-json-path="katkida_bulunanlar.json">
      <!-- Loaded and filtered dynamically via script.js -->
    </div>

    <div style="text-align: center; margin-top: 60px;">
      <a href="index.html" class="btn btn-secondary">&larr; Ana Sayfaya Dön</a>
    </div>
  </section>

  <!-- Footer Section -->
  <footer class="main-footer">
    <div class="footer-bottom">
      <p>&copy; 2026 Ali Kuşçu Camii Gençlik Merkezi. Tüm Hakları Saklıdır.</p>
    </div>
  </footer>

  <div id="google_translate_element" style="display:none;"></div>
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({ pageLanguage: 'tr' }, 'google_translate_element');
    }
  </script>
  <script type="text/javascript"
    src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <script src="script.js"></script>
</body>

</html>
